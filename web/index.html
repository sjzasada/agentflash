<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>agentflash</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <span class="brand">agentflash</span>
    <span class="dir" id="dir"></span>
    <span id="claudeGoal" class="claude-zone" hidden>goal: <em></em></span>
    <span id="claudeAction" class="claude-zone" hidden>do: <em></em></span>
    <span id="claudeSub" class="claude-zone subagent" hidden>[<em></em>]</span>
    <span id="claudeState" class="claude-zone state-idle">idle</span>
    <span class="spacer"></span>
    <button id="refresh">Refresh tree</button>
    <button id="toggle" class="primary">Stop</button>
    <label>window
      <select id="window">
        <option value="10">10s</option>
        <option value="30" selected>30s</option>
        <option value="120">2m</option>
        <option value="300">5m</option>
      </select>
    </label>
    <input type="text" id="filter" placeholder="filter path…" />
    <span class="status" id="status">connecting…</span>
    <span class="status" id="counters" title="received total since page load · drawn this frame">received 0 · drawn 0</span>
  </header>
  <main>
    <aside id="tree">
      <div id="treeContent"></div>
      <div id="treeControls">
        <button id="expandAll" title="Expand all folders recursively">Expand all</button>
        <button id="hideHidden" title="Toggle visibility of dotfiles">Hide hidden</button>
      </div>
    </aside>
    <section id="canvasWrap">
      <canvas id="tape"></canvas>
      <div id="tooltip" class="hidden"></div>
      <div class="legend">
        <span class="lg lg-read"></span>read
        <span class="lg lg-write"></span>modify
        <span class="lg lg-delete"></span>delete
        <span class="lg lg-other"></span>other
      </div>
    </section>
  </main>
  <div id="resizer"></div>
  <footer id="claudePanel">
    <div class="claude-panel-head">
      <span>claude activity</span>
      <span class="claude-panel-buttons">
        <button id="claudeClear" title="Clear log">clear</button>
        <button id="claudeHide" title="Hide panel">hide</button>
      </span>
    </div>
    <div id="claudeLog"></div>
  </footer>
  <script src="/app.js"></script>
</body>
</html>
